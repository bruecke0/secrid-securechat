spring.application.name=securechat-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/securechat}
spring.datasource.username=${DB_USERNAME:securechat_user}
spring.datasource.password=${DB_PASSWORD:securechat_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always